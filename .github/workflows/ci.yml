name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # WeasyPrint needs cairo + pango at the system level; without these
      # test_certificates_e2e's PDF render step skips itself gracefully,
      # but we install them so the full flow runs in CI.
      - name: Install system libs for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info fonts-dejavu

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest
        env:
          # In-memory SQLite; conftest overrides the real URL per-test.
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "test-secret-at-least-sixteen-characters-long"
          ENV: "dev"
          # Affiliate defaults to empty — rewriter is a no-op in tests that
          # don't monkeypatch it.
          COURSERA_AFFILIATE_ID: ""
        run: pytest -q
