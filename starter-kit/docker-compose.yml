version: "3.8"

# ============================================================
#  AI Roadmap Platform
# ------------------------------------------------------------
#  Services:
#    • web        nginx, serves static frontend + proxies /api
#    • backend    FastAPI + SQLite
#    • cron       runs the quarterly curriculum sync script
#
#  Only `web` exposes a port (bound to 127.0.0.1).
#  Your existing reverse proxy handles TLS and routes a
#  subdomain to this port.
#
#  Total footprint idle: ~100 MB RAM, ~300 MB disk + user data.
# ============================================================

services:
  web:
    image: nginx:1.27-alpine
    container_name: roadmap-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - roadmap-net
    mem_limit: 64m
    cpus: 0.25

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadmap-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
    networks:
      - roadmap-net
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadmap-cron
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data
      - ./scripts:/app/scripts:ro
      - ./proposals:/proposals
    command: ["python", "-m", "scripts.quarterly_sync_scheduler"]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - roadmap-net
    mem_limit: 256m
    cpus: 0.5

networks:
  roadmap-net:
    driver: bridge
